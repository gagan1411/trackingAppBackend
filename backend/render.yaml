services:
  - type: web
    name: tracking-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    # Remember to add MONGO_URI and JWT_SECRET in your Render dashboard settings
